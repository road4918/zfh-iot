server {
    listen 80;
    server_name localhost;

    # ============================================
    # 前端应用 - zfh-virtual-device-frontend
    # ============================================
    location /zfh-virtual-device-frontend/ {
        # 修改为你的前端打包后的 dist 目录实际路径
        alias G:/source_code/road0329/zfh-iot/zfh-virtual-device-lab/zfh-virtual-device-frontend/dist/;
        
        index index.html;
        
        # 支持 Vue Router History 模式
        try_files $uri $uri/ /zfh-virtual-device-frontend/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 后端 API - zfh-virtual-device-backend
    # ============================================
    location /zfh-virtual-device-backend/ {
        proxy_pass http://localhost:8080/zfh-virtual-device-backend/;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支持 WebSocket / SockJS
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # 根路径重定向到前端
    # ============================================
    location = / {
        return 301 /zfh-virtual-device-frontend/;
    }
}
